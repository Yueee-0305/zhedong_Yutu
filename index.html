<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>明代浙东舆图 · 沉浸式文献交互系统</title>
    <style>
        /* ... 保持原有样式，新增一个数据提示框 ... */
        #data-popup {
            position: absolute; top: 100px; left: 50px; padding: 20px;
            background: rgba(13, 13, 12, 0.9); border: 1px solid #a63a2b;
            color: #ded0b6; display: none; z-index: 20; max-width: 300px;
        }
    </style>
</head>
<body>
    <div id="data-popup"></div>
    <script>
        // --- API 接入逻辑 ---
        async function fetchHistoricalData(regionName) {
            // 示例：这里接入你的后端 API
            // const response = await fetch(`https://api.yourdomain.com/data?place=${regionName}`);
            // return await response.json();
            
            // 模拟 API 数据
            return { title: regionName, info: "明嘉靖年间，此地为浙东防御重镇，卫所驻军千余..." };
        }

        // --- 核心修改：2秒手势触发进入 ---
        let detectionCounter = 0;
        let isSystemActive = false;

        function checkGestureEntrance(detected) {
            if (isSystemActive) return;

            if (detected) {
                detectionCounter++;
                document.getElementById('loading-text').innerText = `检测到手势，准备入画: ${Math.floor(detectionCounter/30)}s`;
                
                if (detectionCounter >= 60) { // 约2秒 (60帧)
                    startInteraction();
                }
            } else {
                detectionCounter = 0;
                document.getElementById('loading-text').innerText = "请舒展手掌，对准镜头入画";
            }
        }

        function startInteraction() {
            isSystemActive = true;
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 600);
            runMainLoop(); // 启动 3D 渲染
        }

        // --- 修改 onHandResults 衔接逻辑 ---
        function onHandResults(results) {
            // ... 保持原有的隐私模糊与骨骼绘制 ...
            const isDetected = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;
            
            if (!isSystemActive) {
                checkGestureEntrance(isDetected);
            } else if (isDetected) {
                // 交互中逻辑：当手势移动时，执行坐标映射
                updateHandPosition(results.multiHandLandmarks[0]);
                
                // API 交互触发：例如检测到手势移动到特定区域时调用
                if (Math.random() > 0.99) { // 模拟触发频率
                    fetchHistoricalData("镇海卫").then(data => {
                        const popup = document.getElementById('data-popup');
                        popup.innerHTML = `<h3>${data.title}</h3><p>${data.info}</p>`;
                        popup.style.display = 'block';
                    });
                }
            }
        }

        // ... 其余逻辑保持不变 ...
    </script>
</body>
</html>
