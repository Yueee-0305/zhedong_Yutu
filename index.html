<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明嘉靖浙东舆图 - 智能手势沉浸文献系统</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0b0b0a; 
            font-family: "PingFang SC", "Noto Serif CJK SC", serif; color: #ded0b6;
        }
        #app-container { position: relative; width: 100vw; height: 100vh; }
        #canvas-container { width: 100%; height: 100%; z-index: 1; }
        
        /* 顶部古典主义UI遮罩 */
        .system-header {
            position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none;
            background: linear-gradient(to right, rgba(11, 11, 10, 0.95), rgba(11, 11, 10, 0));
            padding: 18px 40px 18px 20px; border-left: 4px solid #b83b26;
        }
        .system-header h1 { margin: 0; font-size: 26px; font-weight: 700; letter-spacing: 5px; color: #e8dfc7; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .system-header p { margin: 6px 0 0 0; font-size: 13px; color: #8a806f; letter-spacing: 1.5px; }

        /* 状态指示器 */
        #status-indicator {
            position: absolute; top: 40px; right: 30px; z-index: 10;
            background: rgba(20, 20, 18, 0.85); padding: 8px 20px; border-radius: 3px;
            font-size: 13px; border: 1px solid rgba(184, 59, 38, 0.3); display: flex; align-items: center; gap: 8px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #a63a2b; transition: all 0.3s; }
        .dot.active { background-color: #52c41a; box-shadow: 0 0 10px #52c41a; }

        /* 右下角手势监控（严格隐私保护） */
        #preview-box {
            position: absolute; bottom: 30px; right: 30px; width: 230px; height: 172px;
            border: 1px solid rgba(138, 128, 111, 0.35); border-radius: 4px; overflow: hidden;
            background: #000; z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        #preview-label {
            position: absolute; top: 6px; left: 6px; background: rgba(11,11,10,0.85);
            color: #c4b59d; font-size: 11px; padding: 2px 6px; z-index: 12; border: 1px solid rgba(138,128,111,0.2);
        }
        #webcam { display: none; }
        #blur-canvas { width: 100%; height: 100%; filter: blur(9px); opacity: 0.4; transform: scale(1.06); }
        #skeleton-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11; }

        /* 文化引导加载页 */
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0a;
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.7s ease;
        }
        .loader {
            width: 45px; height: 45px; border: 2px solid rgba(184, 59, 38, 0.1); border-top: 2px solid #b83b26;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .start-btn {
            background: transparent; border: 1px solid #8a806f; color: #e8dfc7;
            padding: 14px 36px; font-size: 16px; cursor: pointer; letter-spacing: 4px; transition: all 0.4s; display: none;
        }
        .start-btn:hover { background: #b83b26; color: #fff; border-color: #b83b26; box-shadow: 0 0 25px rgba(184, 59, 38, 0.5); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="app-container">
        <div id="loading-overlay">
            <div class="loader" id="sys-loader"></div>
            <div id="loading-text" style="color:#8a806f; font-size:14px; margin-bottom:20px; letter-spacing:1px;">明代文献资产配置中...</div>
            <button class="start-btn" id="btn-start">入画·考文献</button>
        </div>

        <div class="system-header">
            <h1>明代浙江舆图 · 浙东沿海防线</h1>
            <p>手势追踪：掌心聚焦放大以探照浙东卫所与政区中心（朱砂方块）</p>
        </div>

        <div id="status-indicator">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">检测硬件中...</span>
        </div>

        <div id="canvas-container"></div>
        
        <div id="preview-box">
            <div id="preview-label">骨骼形态 (面部及背景隐私已模糊)</div>
            <video id="webcam" autoplay playsinline></video>
            <canvas id="blur-canvas"></canvas>
            <canvas id="skeleton-canvas"></canvas>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const blurCanvas = document.getElementById('blur-canvas');
        const skeletonCanvas = document.getElementById('skeleton-canvas');
        const blurCtx = blurCanvas.getContext('2d');
        const skeletonCtx = skeletonCanvas.getContext('2d');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let handTrackingData = { x: 0.5, y: 0.5, detected: false };

        // --- Three.js 3D 卷轴渲染架构 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4.6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // 自动读取同根目录下的地图文件
        const textureLoader = new THREE.TextureLoader();
        const mapTexture = textureLoader.load('明代浙江舆图（明嘉靖二十七年）.jpg', 
            function() { console.log("浙东海防图加载成功"); },
            undefined,
            function() { console.warn("未检测到目标图片，启用古风备用图层"); }
        );

        // 高级水墨 Shader 核心：实现完美的掌心折射放大与朱砂晕染
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            uniform sampler2D uTexture;
            uniform vec2 uHandPos;       
            uniform float uRadius;       // 放大镜物理半径
            uniform float uZoom;         // 折射倍率
            uniform float uIntensity;    // 探照提亮系数
            uniform float uDetected;     

            void main() {
                vec2 uv = vUv;
                
                if (uDetected > 0.5) {
                    float dist = distance(uv, uHandPos);
                    
                    // 1. 局部动态折射放大
                    if (dist < uRadius) {
                        uv = uHandPos + (uv - uHandPos) / uZoom;
                    }
                    
                    vec4 texColor = texture2D(uTexture, uv);
                    
                    // 2. 探照灯照亮与朱砂暖色光圈边缘
                    if (dist < uRadius) {
                        texColor.rgb *= uIntensity; // 照亮宣纸画面
                        
                        // 晕染古典朱砂红（#b83b26）边缘金石光圈
                        float edgeWidth = 0.007;
                        if (dist > (uRadius - edgeWidth)) {
                            float edgeFactor = (dist - (uRadius - edgeWidth)) / edgeWidth;
                            texColor.rgb += vec3(0.72, 0.23, 0.15) * edgeFactor * 2.2;
                        }
                    } else {
                        // 外部环境压暗，创造黑夜中手执火把考证文献的孤独沉浸感
                        texColor.rgb *= 0.25;
                    }
                    gl_FragColor = texColor;
                } else {
                    // 常态下画卷整体暗调可见
                    gl_FragColor = texture2D(uTexture, uv) * 0.65;
                }
            }
        `;

        const shaderUniforms = {
            uTexture: { value: mapTexture },
            uHandPos: { value: new THREE.Vector2(0.5, 0.5) },
            uRadius: { value: 0.12 },
            uZoom: { value: 1.8 },
            uIntensity: { value: 1.5 },
            uDetected: { value: 0.0 }
        };

        const customMaterial = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: shaderUniforms,
            side: THREE.DoubleSide
        });

        // 弧形环绕面：优化卷轴宽高比例，让人感觉完全置身于画幅环抱之中
        const geometry = new THREE.CylinderGeometry(8.2, 8.2, 6.0, 45, 1, true, Math.PI * 0.64, Math.PI * 0.72);
        const mapMesh = new THREE.Mesh(geometry, customMaterial);
        mapMesh.scale.set(-1, 1, 1); // 反射朝内
        scene.add(mapMesh);

        // --- MediaPipe 视觉流与生物骨架计算 ---
        function onHandResults(results) {
            if (blurCanvas.width !== videoElement.videoWidth) {
                blurCanvas.width = skeletonCanvas.width = videoElement.videoWidth;
                blurCanvas.height = skeletonCanvas.height = videoElement.videoHeight;
            }

            // 1. 严格隐私屏障：高斯模糊人脸背景
            blurCtx.clearRect(0, 0, blurCanvas.width, blurCanvas.height);
            blurCtx.drawImage(results.image, 0, 0, blurCanvas.width, blurCanvas.height);

            // 2. 清晰呈现的铜黄色手部骨骼结构线
            skeletonCtx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handTrackingData.detected = true;
                statusDot.classList.add('active');
                statusText.innerText = "交互中 | 掌心放大镜已聚焦";

                const landmarks = results.multiHandLandmarks[0];

                // 解耦融合手掌质心 (Palmar Centroid)
                const palmJoints = [0, 5, 9, 13, 17];
                let sumX = 0, sumY = 0;
                palmJoints.forEach(id => {
                    sumX += landmarks[id].x;
                    sumY += landmarks[id].y;
                });
                
                // 镜像翻转映射
                handTrackingData.x = 1.0 - (sumX / palmJoints.length);
                handTrackingData.y = sumY / palmJoints.length;

                // 渲染手部美学骨骼
                drawChinesrInkSkeleton(skeletonCtx, landmarks);
            } else {
                handTrackingData.detected = false;
                statusDot.classList.remove('active');
                statusText.innerText = "请面向镜头舒展手掌";
            }
        }

        function drawChinesrInkSkeleton(ctx, landmarks) {
            ctx.strokeStyle = '#b83b26'; // 朱砂红骨骼线，呼应古图政区标记
            ctx.lineWidth = 4;
            ctx.fillStyle = '#e8dfc7';   // 绢白关节节点

            const connections = [
                [0,1],[1,2],[2,3],[3,4],
                [0,5],[5,6],[6,7],[7,8],
                [5,9],[9,10],[10,11],[11,12],
                [9,13],[13,14],[14,15],[15,16],
                [13,17],[17,18],[18,19],[19,20],[0,17]
            ];

            ctx.beginPath();
            connections.forEach(([s, d]) => {
                ctx.moveTo(landmarks[s].x * ctx.canvas.width, landmarks[s].y * ctx.canvas.height);
                ctx.lineTo(landmarks[d].x * ctx.canvas.width, landmarks[d].y * ctx.canvas.height);
            });
            ctx.stroke();

            for(let i=0; i<21; i++) {
                ctx.beginPath();
                ctx.arc(landmarks[i].x * ctx.canvas.width, landmarks[i].y * ctx.canvas.height, 4, 0, 2*Math.PI);
                ctx.fill();
            }
        }

        const handsInstance = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        handsInstance.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        handsInstance.onResults(onHandResults);

        const cameraInstance = new Camera(videoElement, {
            onFrame: async () => { await handsInstance.send({ image: videoElement }); },
            width: 640, height: 480
        });

        // --- 阻尼过渡核心主循环 ---
        function renderLoop() {
            requestAnimationFrame(renderLoop);

            if (handTrackingData.detected) {
                shaderUniforms.uDetected.value = 1.0;
                // 用线性插值（Lerp）做 14% 的运动平滑阻尼，完美吸收人手的微小震颤，让镜面极其稳健丝滑
                shaderUniforms.uHandPos.value.x += (handTrackingData.x - shaderUniforms.uHandPos.value.x) * 0.14;
                shaderUniforms.uHandPos.value.y += (handTrackingData.y - shaderUniforms.uHandPos.value.y) * 0.14;
            } else {
                shaderUniforms.uDetected.value = 0.0;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 页面资源控制流初始化
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('sys-loader').style.display = 'none';
                document.getElementById('loading-text').style.display = 'none';
                const startBtn = document.getElementById('btn-start');
                startBtn.style.display = 'block';
                startBtn.addEventListener('click', () => {
                    cameraInstance.start()
                        .then(() => {
                            document.getElementById('loading-overlay').style.opacity = '0';
                            setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 700);
                            renderLoop();
                        })
                        .catch(err => { alert("摄像头未能正常唤醒，请在浏览器地址栏检查并授予摄像头权限。"); });
                });
            }, 1000);
        });
    </script>
</body>
</html>
