<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>明嘉靖浙东舆图 - 智能交互系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'PingFang SC', sans-serif; }
        #flowing-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -999;
            background-repeat: repeat; animation: mapFlow 60s linear infinite;
        }
        @keyframes mapFlow { 0% { background-position: 0 0; } 100% { background-position: -2000px -2000px; } }
        .ui-panel { position: absolute; top: 20px; left: 20px; z-index: 10; color: white; }
    </style>
</head>
<body>
    <div id="flowing-bg"></div>

    <div class="ui-panel p-6 bg-black/60 backdrop-blur-md rounded-2xl border border-amber-800/50 max-w-sm">
        <h1 class="text-2xl font-bold text-amber-100 mb-2">明嘉靖浙东舆图</h1>
        <p class="text-xs text-gray-400 mb-4">当前底图：明代浙东防线舆图</p>
        
        <button onclick="askGemini()" class="w-full py-2 bg-amber-900/80 hover:bg-amber-700 text-amber-100 rounded-lg border border-amber-600 transition">✨ 询问 AI 舆图历史</button>
        <div id="ai-response" class="hidden mt-4 p-3 bg-black/40 rounded-lg text-amber-200 text-sm leading-relaxed border-l-2 border-amber-500 italic"></div>
    </div>

    <script>
        // 1. 设置底图
        const bg = document.getElementById('flowing-bg');
        const MAP_URL = 'https://raw.githubusercontent.com/Yueee-0305/zhedong_Yutu/main/map_data.jpg';
        bg.style.backgroundImage = `url('${MAP_URL}')`;
        bg.style.backgroundSize = "1500px auto";

        // 2. Gemini API 调用逻辑
        const apiKey = ""; // 若在 GitHub Pages 部署，请确保使用安全代理或配置环境变量
        async function askGemini() {
            const respDiv = document.getElementById('ai-response');
            respDiv.classList.remove('hidden');
            respDiv.innerText = "✨ 正在考据舆图防线...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "结合明代嘉靖二十七年的历史背景，简述浙东沿海卫所防线对于当时抗倭的重要意义。" }] }]
                    })
                });
                const data = await response.json();
                respDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                respDiv.innerText = "✨ 抱歉，AI 档案馆连接失败。";
            }
        }
    </script>
</body>
</html>
