<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明嘉靖浙江舆图 - 沉浸式水墨交互系统</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0d0d0c; 
            font-family: "PingFang SC", "ChaoShu", serif; color: #d9cdb8;
        }
        #app-container { position: relative; width: 100vw; height: 100vh; }
        #canvas-container { width: 100%; height: 100%; z-index: 1; }
        
        /* 古风水墨UI遮罩 */
        .system-header {
            position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none;
            background: linear-gradient(to right, rgba(13, 13, 12, 0.95), rgba(13, 13, 12, 0));
            padding: 15px 35px 15px 20px; border-left: 4px solid #a63a2b;
        }
        .system-header h1 { margin: 0; font-size: 26px; font-weight: bold; letter-spacing: 4px; color: #ded0b6; }
        .system-header p { margin: 6px 0 0 0; font-size: 13px; color: #8c8170; letter-spacing: 1px; }

        /* 状态指示器 */
        #status-indicator {
            position: absolute; top: 40px; right: 30px; z-index: 10;
            background: rgba(22, 22, 20, 0.85); padding: 8px 18px; border-radius: 4px;
            font-size: 13px; border: 1px solid rgba(166, 58, 43, 0.3); display: flex; align-items: center; gap: 8px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #bf3f3f; transition: all 0.3s; }
        .dot.active { background-color: #52c41a; box-shadow: 0 0 10px #52c41a; }

        /* 右下角隐私保护监控窗 */
        #preview-box {
            position: absolute; bottom: 30px; right: 30px; width: 220px; height: 165px;
            border: 1px solid rgba(140, 129, 112, 0.4); border-radius: 4px; overflow: hidden;
            background: #000; z-index: 10; box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        #preview-label {
            position: absolute; top: 6px; left: 6px; background: rgba(13,13,12,0.8);
            color: #bdad94; font-size: 11px; padding: 2px 6px; z-index: 12; border: 1px solid rgba(140,129,112,0.2);
        }
        #webcam { display: none; }
        #blur-canvas { width: 100%; height: 100%; filter: blur(8px); opacity: 0.45; transform: scale(1.05); }
        #skeleton-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11; }

        /* 入口引导层 */
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0d0d0c;
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease;
        }
        .loader {
            width: 50px; height: 50px; border: 2px solid rgba(166, 58, 43, 0.1); border-top: 2px solid #a63a2b;
            border-radius: 50%; animation: spin 1.2s linear infinite; margin-bottom: 25px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .start-btn {
            background: transparent; border: 1px solid #8c8170; color: #ded0b6;
            padding: 14px 32px; font-size: 16px; cursor: pointer; letter-spacing: 3px; transition: all 0.4s; display: none;
        }
        .start-btn:hover { background: #a63a2b; color: #fff; border-color: #a63a2b; box-shadow: 0 0 20px rgba(166, 58, 43, 0.5); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="app-container">
        <div id="loading-overlay">
            <div class="loader" id="sys-loader"></div>
            <div id="loading-text" style="color:#8c8170; font-size:15px; margin-bottom:20px; letter-spacing:1px;">舆图文献资产加载中...</div>
            <button class="start-btn" id="btn-start">入画·观舆图</button>
        </div>

        <div class="system-header">
            <h1>明代浙江舆图 (嘉靖二十七年)</h1>
            <p>掌心探照：放大并照亮浙东海防行政中心（红色方块）</p>
        </div>

        <div id="status-indicator">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">未检测到手势</span>
        </div>

        <div id="canvas-container"></div>
        
        <div id="preview-box">
            <div id="preview-label">手势追踪 (隐私模糊模式)</div>
            <video id="webcam" autoplay playsinline></video>
            <canvas id="blur-canvas"></canvas>
            <canvas id="skeleton-canvas"></canvas>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const blurCanvas = document.getElementById('blur-canvas');
        const skeletonCanvas = document.getElementById('skeleton-canvas');
        const blurCtx = blurCanvas.getContext('2d');
        const skeletonCtx = skeletonCanvas.getContext('2d');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let handTrackingData = { x: 0.5, y: 0.5, detected: false };

        // --- Three.js 渲染配置 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        // 视角相机：增强环绕置身感
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // 纹理加载：请确保图片上传到仓库且名字完全一致
        const textureLoader = new THREE.TextureLoader();
        const mapTexture = textureLoader.load('明代浙江舆图（明嘉靖二十七年）.jpg', 
            function(txt) { console.log("浙江舆图成功载入！"); },
            undefined,
            function(err) { console.warn("未找到图片，启用古风兜底纹理"); }
        );

        // 自定义水墨探照Shader
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            uniform sampler2D uTexture;
            uniform vec2 uHandPos;       
            uniform float uRadius;       // 掌心放大镜半径
            uniform float uZoom;         // 放大倍率
            uniform float uIntensity;    // 照亮强度
            uniform float uDetected;     

            void main() {
                vec2 uv = vUv;
                
                if (uDetected > 0.5) {
                    float dist = distance(uv, uHandPos);
                    
                    // 1. 放大镜折射
                    if (dist < uRadius) {
                        uv = uHandPos + (uv - uHandPos) / uZoom;
                    }
                    
                    vec4 texColor = texture2D(uTexture, uv);
                    
                    // 2. 探照灯照亮与古风朱砂红光圈
                    if (dist < uRadius) {
                        // 局部大幅提亮，凸显红色行政中心方块
                        texColor.rgb *= uIntensity;
                        
                        // 边缘晕染出类似于宣纸浸润、水墨光圈的效果
                        float edgeWidth = 0.008;
                        if (dist > (uRadius - edgeWidth)) {
                            float edgeFactor = (dist - (uRadius - edgeWidth)) / edgeWidth;
                            // 融入古典朱砂红（#a63a2b）边缘暖光圈
                            texColor.rgb += vec3(0.65, 0.22, 0.16) * edgeFactor * 2.0;
                        }
                    } else {
                        // 外部营造水墨留白的昏暗环境，突出手势核心
                        texColor.rgb *= 0.28;
                    }
                    gl_FragColor = texColor;
                } else {
                    // 无手势时保持全图柔和可见
                    gl_FragColor = texture2D(uTexture, uv) * 0.7;
                }
            }
        `;

        const shaderUniforms = {
            uTexture: { value: mapTexture },
            uHandPos: { value: new THREE.Vector2(0.5, 0.5) },
            uRadius: { value: 0.11 },
            uZoom: { value: 1.75 },
            uIntensity: { value: 1.5 },
            uDetected: { value: 0.0 }
        };

        const customMaterial = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: shaderUniforms,
            side: THREE.DoubleSide
        });

        // 圆柱形卷轴：半径 8, 高度 5.8，完美承载古代长幅舆图，将人包裹在中间
        const geometry = new THREE.CylinderGeometry(8, 8, 5.8, 40, 1, true, Math.PI * 0.65, Math.PI * 0.7);
        const mapMesh = new THREE.Mesh(geometry, customMaterial);
        mapMesh.scale.set(-1, 1, 1); // 反转使其面向内部的你
        scene.add(mapMesh);

        // --- MediaPipe 骨骼计算与隐私控制 ---
        function onHandResults(results) {
            if (blurCanvas.width !== videoElement.videoWidth) {
                blurCanvas.width = skeletonCanvas.width = videoElement.videoWidth;
                blurCanvas.height = skeletonCanvas.height = videoElement.videoHeight;
            }

            // 1. 隐私处理：原生背景强制高斯模糊
            blurCtx.clearRect(0, 0, blurCanvas.width, blurCanvas.height);
            blurCtx.drawImage(results.image, 0, 0, blurCanvas.width, blurCanvas.height);

            // 2. 纯骨骼线层：明晰突出手势动作
            skeletonCtx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handTrackingData.detected = true;
                statusDot.classList.add('active');
                statusText.innerText = "手势已连接 | 正在探照政区中心";

                const landmarks = results.multiHandLandmarks[0];

                // 精准融合掌心位置（手腕与主要指根几何中心）
                const palmPoints = [0, 5, 9, 13, 17];
                let sumX = 0, sumY = 0;
                palmPoints.forEach(id => {
                    sumX += landmarks[id].x;
                    sumY += landmarks[id].y;
                });
                
                // 翻转 X 轴适配摄像头镜像
                handTrackingData.x = 1.0 - (sumX / palmPoints.length);
                handTrackingData.y = sumY / palmPoints.length;

                // 绘制水墨风骨骼网络
                drawInkSkeleton(skeletonCtx, landmarks);
            } else {
                handTrackingData.detected = false;
                statusDot.classList.remove('active');
                statusText.innerText = "未检测到手势";
            }
        }

        function drawInkSkeleton(ctx, landmarks) {
            ctx.strokeStyle = '#a63a2b'; // 朱砂红骨骼线，呼应图中的红色政区方块
            ctx.lineWidth = 4;
            ctx.fillStyle = '#ded0b6';   // 关节处使用绢帛底色点缀

            const handConnections = [
                [0,1],[1,2],[2,3],[3,4],
                [0,5],[5,6],[6,7],[7,8],
                [5,9],[9,10],[10,11],[11,12],
                [9,13],[13,14],[14,15],[15,16],
                [13,17],[17,18],[18,19],[19,20],[0,17]
            ];

            ctx.beginPath();
            handConnections.forEach(([src, dest]) => {
                ctx.moveTo(landmarks[src].x * ctx.canvas.width, landmarks[src].y * ctx.canvas.height);
                ctx.lineTo(landmarks[dest].x * ctx.canvas.width, landmarks[dest].y * ctx.canvas.height);
            });
            ctx.stroke();

            for(let i=0; i<21; i++) {
                ctx.beginPath();
                ctx.arc(landmarks[i].x * ctx.canvas.width, landmarks[i].y * ctx.canvas.height, 4, 0, 2*Math.PI);
                ctx.fill();
            }
        }

        const handsModel = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        handsModel.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        handsModel.onResults(onHandResults);

        const cameraService = new Camera(videoElement, {
            onFrame: async () => { await handsModel.send({ image: videoElement }); },
            width: 640, height: 480
        });

        // --- 渲染时钟与平滑缓动 ---
        function runMainLoop() {
            requestAnimationFrame(runMainLoop);

            if (handTrackingData.detected) {
                shaderUniforms.uDetected.value = 1.0;
                // 用无感阻尼算法平滑追踪坐标，防止人手颤抖
                shaderUniforms.uHandPos.value.x += (handTrackingData.x - shaderUniforms.uHandPos.value.x) * 0.14;
                shaderUniforms.uHandPos.value.y += (handTrackingData.y - shaderUniforms.uHandPos.value.y) * 0.14;
            } else {
                shaderUniforms.uDetected.value = 0.0;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 生命周期引导管理
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('sys-loader').style.display = 'none';
                document.getElementById('loading-text').style.display = 'none';
                const startBtn = document.getElementById('btn-start');
                startBtn.style.display = 'block';
                startBtn.addEventListener('click', () => {
                    cameraService.start()
                        .then(() => {
                            document.getElementById('loading-overlay').style.opacity = '0';
                            setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 600);
                            runMainLoop();
                        })
                        .catch(err => { alert("无法调用摄像头，请检查权限。"); });
                });
            }, 1000);
        });
    </script>
</body>
</html>
